<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cadastro Acessível</title>
  <link rel="stylesheet" href="./style.css">
  <script src="./main.js" defer></script>
</head>
<body>
  <h1>Cadastro</h1>
  <div class="div-body">
    <form action="">
      <legend>Dados Pessoais</legend>

      <fieldset>
        <legend>Dados de Identificação</legend>

        <label for="Nome Completo">Nome Completo</label>
        <input type="text" name="" id="">

        <label for="Data de Nascimento">Data de Nascimento</label>
        <input type="date" name="" id="">
        
        <label for="CPF">CPF</label>
        <input type="number" name="" id="">
        <legend> Qual seu gênero?</legend>
        <label for="Masculino">
          <input type="radio" id="" name="genero" value="1">
          Masculino
        </label>
        <label for="Feminino">
          <input type="radio" id="" name="genero" value="2">
          Feminino
        </label>
        <label for="Outro">
          <input type="radio" id="" name="genero" value="3">
          Outro
        </label>
        </fieldset>

        <fieldset>
        <legend>Dados de Contato</legend>
        <label for="E-mail">E-mail</label>
        <input type="email" name="" id="">

        <label for="Número de Telefone">Número de Telefone</label>
        <input type="number" name="" id="">
      </fieldset>
      <fieldset>
        <legend>Dados de Endereço</legend>

        <label for="Rua">Rua</label>
        <input type="text" name="" id="">
        <label for="Bairro">Bairro</label>
        <input type="text" name="" id="">
        <label for="Cidade">Cidade</label>
        <input type="text" name="" id="">

        <label for="">Estado</label>
        <select name="Estado" id="">
          <option value="" name="Acre">Acre</option>
          <option value="" name="Alagoas">Alagoas</option>
          <option value="" name="Amapá">Amapá</option>
          <option value="" name="Amazonas">Amazonas</option>
          <option value="" name="Bahia">Bahia</option>
          <option value="" name="Ceará">Ceará</option>
          <option value="" name="Espírito Santo">Espírito Santo</option>
          <option value="" name="Goiás">Goiás</option>
          <option value="" name="Maranhão">Maranhão</option>
          <option value="" name="Mato Grosso">Mato Grosso</option>
          <option value="" name="Mato Grosso do Sul">Mato Grosso do Sul</option>
          <option value="" name="Minas Gerais">Minas Gerais</option>
          <option value="" name="Pará">Pará</option>
          <option value="" name="Paraíba">Paraíba</option>
          <option value="" name="Paraná">Paraná</option>
          <option value="" name="Pernambuco">Pernambuco</option>
          <option value="" name="Piauí">Piauí</option>
          <option value="" name="Rio de Janeiro">Rio de Janeiro</option>
          <option value="" name="Rio Grande do Norte">Rio Grande do Norte</option>
          <option value="" name="Rio Grande do Sul">Rio Grande do Sul</option>
          <option value="" name="Rondônia">Rondônia</option>
          <option value="" name="Roraima">Roraima</option>
          <option value="" name="Santa Catarina">Santa Catarina</option>
          <option value="" name="São Paulo">São Paulo</option>
          <option value="" name="Sergipe">Sergipe</option>
          <option value="" name="Tocantins">Tocantins</option>
        </select>
      </fieldset>
    </form>
  </div>
</body>
