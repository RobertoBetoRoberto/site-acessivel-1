<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cadastro Acessível</title>
  <link rel="stylesheet" href="./style.css">
  <script src="./main.js" defer></script>
</head>
<body>
  <h1>Cadastro</h1>
  <div class="div-body">
    <form action="">
      <legend>Dados Pessoais</legend>

      <fieldset>
        <legend>Dados de Identificação</legend>

        <label for="Nome Completo">Nome Completo</label>
        <input type="text" name="" class="input" id="nome">
        <span class="erro-mensagem" id="erro-nome"></span>

        <label for="Data de Nascimento">Data de Nascimento</label>
        <input type="date" name="" class="input" id="data">
        <span class="erro-mensagem" id="erro-data"></span>
        
        <label for="CPF">CPF</label>
        <input type="tel" name="" minlength="11" maxlength="11" class="input" id="cpf">
        <span class="erro-mensagem" id="erro-cpf"></span>
        </fieldset>
        <fieldset>
          <legend> Qual seu gênero?</legend>
          <label for="Masculino">
            <input type="radio" class="input" name="genero" value="1">
            Masculino
          </label>
          <label for="Feminino">
            <input type="radio" class="input" name="genero" value="2">
            Feminino
          </label>
          <label for="Outro">
            <input type="radio" class="input" name="genero" value="3">
            Outro
          </label>
        <span class="erro-mensagem" id="erro-genero"></span>
        </fieldset>

        <fieldset>
        <legend>Dados de Contato</legend>
        <label for="E-mail">E-mail</label>
        <input type="email" name="" class="input" id="email">
        <span class="erro-mensagem" id="erro-email"></span>

        <label for="Número de Telefone">Número de Telefone</label>
        <input type="tel" name="" inputmode="numeric" minlength="11" maxlength="11" class="input" id="telefone">
        <span class="erro-mensagem" id="erro-telefone"></span>
      </fieldset>
      <fieldset>
        <legend>Dados de Endereço</legend>

        <label for="Rua">Rua</label>
        <input type="text" name="" class="input" id="rua">
        <span class="erro-mensagem" id="erro-rua"></span>
        
        <label for="Bairro">Bairro</label>
        <input type="text" name="" class="input" id="bairro">
        <span class="erro-mensagem" id="erro-bairro"></span>
        
        <label for="Cidade">Cidade</label>
        <input type="text" name="" class="input" id="cidade">
        <span class="erro-mensagem" id="erro-cidade"></span>

        <label for="">Estado</label>
        <select name="Estado" class="input" id="estado">
          <option value="">Selecione um estado</option>
          <option value="ac">Acre</option>
          <option value="al">Alagoas</option>
          <option value="ap">Amapá</option>
          <option value="am">Amazonas</option>
          <option value="ba">Bahia</option>
          <option value="ce">Ceará</option>
          <option value="es">Espírito Santo</option>
          <option value="go">Goiás</option>
          <option value="ma">Maranhão</option>
          <option value="mt">Mato Grosso</option>
          <option value="ms">Mato Grosso do Sul</option>
          <option value="mg">Minas Gerais</option>
          <option value="pa">Pará</option>
          <option value="pb">Paraíba</option>
          <option value="pr">Paraná</option>
          <option value="pe">Pernambuco</option>
          <option value="pi">Piauí</option>
          <option value="rj">Rio de Janeiro</option>
          <option value="rn">Rio Grande do Norte</option>
          <option value="rs">Rio Grande do Sul</option>
          <option value="ro">Rondônia</option>
          <option value="rr">Roraima</option>
          <option value="sc">Santa Catarina</option>
          <option value="sp">São Paulo</option>
          <option value="se">Sergipe</option>
          <option value="to">Tocantins</option>
        </select>
        <span class="erro-mensagem" id="erro-estado"></span>
      </fieldset>
      <div class="area-botao">
        <button type="button" onclick="verificar()">Enviar Formulário</button>
        <button type="button" onclick="limparInput()">Limpar Formulário</button>
      </div>
    </form>
  </div>
</body>
